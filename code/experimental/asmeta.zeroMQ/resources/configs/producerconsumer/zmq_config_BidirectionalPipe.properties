# Configuration file for an ASM-based simulation. It defines, for each model and for the environment,
# the runtime ASM model paths, hos, ZeroMQ endpoints,
# port pools used for publisher sockets, and the environment functions together with their concrete test.
# These specifications are used by the runtime to instantiate the models,
#configure the communication channels among them, and drive the environment
# behaviour during the simulation;

# MODELS AND COMPOSITION
setup.M1=resources/models/bidirectionalPipe/m1.asm
setup.M2=resources/models/bidirectionalPipe/m2.asm
setup.setup_comp=(M1<|>M2)

#COMMONS
common.HOST=127.0.0.1
common.ASM_ENVIRONMENT_ADDRESS=tcp://127.0.0.1:5563
common.ASM_ENVIRONMENT_FUNCTIONS=envInput

# M1 CONFIGURATION
M1.ZMQ_PUB_SOCKET=tcp://*:5561
M1.ASM_ENVIRONMENT_FUNCTIONS=envInput
#M1 ascolta M2 e env
M1.ZMQ_SUB_CONNECT_ADDRESSES=tcp://127.0.0.1:5564,tcp://127.0.0.1:5563
M1.CONSOLE_INPUT_FUNCTIONS=envInput,1
# M2 CONFIGURATION
M2.ZMQ_PUB_SOCKET=tcp://*:5564
M2.ZMQ_SUB_CONNECT_ADDRESSES=tcp://127.0.0.1:5561

# ENVIRONMENT
environment.address=tcp://*:5563
# ms pause between sends
environment.pause=3000
environment.env_functions=envInput
environment.envInput=1