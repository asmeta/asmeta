# MODELS AND COMPOSITION

pillbox.RUNTIME_MODEL_PATH=resources/models/MRM/pillbox.asm
safePillbox.RUNTIME_MODEL_PATH=resources/models/MRM/safePillbox.asm


setup.setup_comp= pillbox <|> safePillbox

#COMMONS
common.HOST=127.0.0.1
common.ASM_ENVIRONMENT_FUNCTIONS=systemTime,openSwitch

pillbox.INITIAL_OUTPUTS=\
	actual_time_consumption(compartment1)=[0],\
	actual_time_consumption(compartment2)=[0,0],\
    name(compartment1)=fosamax,\
    name(compartment2)=moment,\
    drugIndex(compartment1)=0,\
    drugIndex(compartment2)=0,\
    redLed(compartment1)=OFF,\
    redLed(compartment2)=OFF,\
    isPillMissed(compartment1)=false,\
    isPillMissed(compartment2)=false,\
    pillTakenWithDelay(compartment1)=false,\
    pillTakenWithDelay(compartment2)=false,\
    openSwitch(compartment1)=false,\
    openSwitch(compartment2)=false,\
    day=0,\
    setNewTime(compartment1)=false,\
    setNewTime(compartment2)=false,\
    setOriginalTime(compartment1)=false,\
    setOriginalTime(compartment2)=false,\
    newTime(compartment1)=0,\
    newTime(compartment2)=0,\
    skipNextPill(compartment1)=false,\
    skipNextPill(compartment2)=false

safePillbox.INITIAL_OUTPUTS=\
    setNewTime(compartment1)=false,\
    setNewTime(compartment2)=false,\
    setOriginalTime(compartment1)=false,\
    setOriginalTime(compartment2)=false,\
    newTime(compartment1)=0,\
    newTime(compartment2)=0,\
    skipNextPill(compartment1)=false,\
    skipNextPill(compartment2)=false,\
    actual_time_consumption(compartment1)=[0],\
    actual_time_consumption(compartment2)=[0,0]


# PILLBOX CONFIGURATION
pillbox.ZMQ_PUB_SOCKET=tcp://*:5556
pillbox.ZMQ_SUB_CONNECT_ADDRESSES=tcp://127.0.0.1:5557
pillbox.ASM_SUB_FUNCTIONS=setNewTime,setOriginalTime,newTime,skipNextPill
pillbox.ASM_ENVIRONMENT_FUNCTIONS=systemTime,openSwitch
pillbox.ASM_ENVIRONMENT_ADDRESS=tcp://127.0.0.1:5570

# SAFEPILLBOX CONFIGURATION
safePillbox.ZMQ_PUB_SOCKET=tcp://*:5557
safePillbox.ZMQ_SUB_CONNECT_ADDRESSES=tcp://127.0.0.1:5556
safePillbox.ASM_SUB_FUNCTIONS=isPillMissed,pillTakenWithDelay,actual_time_consumption,day,drugIndex,name,time_consumption,redLed
safePillbox.ASM_ENVIRONMENT_FUNCTIONS=systemTime,openSwitch
safePillbox.ASM_ENVIRONMENT_ADDRESS=tcp://127.0.0.1:5570


# ENVIRONMENT
environment.address=tcp://*:5570
environment.pause=7000
environment.systemTime= 361,361,366,500,742,753,753,790,1140,1145
environment.env_functions=systemTime,openSwitch
environment.openSwitch(compartment1)= false,true,false,false,false,false,false,false,false,false
environment.openSwitch(compartment2)= false,false,false,true,false,false,false,false,false,false