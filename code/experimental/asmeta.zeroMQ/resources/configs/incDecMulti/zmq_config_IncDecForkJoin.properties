# MODELS AND COMPOSITION

M1.RUNTIME_MODEL_PATH=resources/models/ForkJoin/inc.asm
M2.RUNTIME_MODEL_PATH=resources/models/ForkJoin/dec.asm
M3.RUNTIME_MODEL_PATH=resources/models/ForkJoin/multi.asm

setup.setup_comp= (M1||M2||M3)

#COMMONS
common.HOST=127.0.0.1

# M1 CONFIGURATION
M1.ZMQ_PUB_SOCKET=tcp://*:5554
M1.FORKJOIN_MODE=true


# M2 CONFIGURATION
M2.ZMQ_PUB_SOCKET=tcp://*:5557
M2.FORKJOIN_MODE=true

#M3 CONFIGURATION
M3.ZMQ_PUB_SOCKET=tcp://*:5558
M3.FORKJOIN_MODE=true

# ENVIRONMENT
environment.address=tcp://*:5563
# ms pause between sends
environment.pause=3000
environment.env_functions=myinput
# each key = a topic name, value = list of message-values
environment.myinput = 2,3,4,2,6